<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Fred Berberich</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="assets/css/site.css">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body>
<div class="site-shell">
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="index.html">Fred Berberich</a>
            <button class="menu-toggle" type="button" onclick="toggleMenu()">☰</button>
            <nav><ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="ProjectPage.html">Projects</a></li>
                <li><a href="Resume.html">Resume</a></li>
                <li><a href="Publicationspage.html">Publications</a></li>
                <li><a href="ContactPage.html" aria-current="page">Contact</a></li>
            </ul></nav>
        </div>
    </header>
    <main>
        <div class="container">
            <p class="section-kicker">Contact</p>
            <h1 class="section-title">Send a secure message</h1>
            <p style="margin:0 0 1rem;color:#475569;">This form uses EmailJS and your existing template IDs to securely deliver messages.</p>
            <form id="contactForm" class="contact-form">
                <div class="form-grid">
                    <div><label for="firstname">First Name</label><input type="text" id="firstname" name="firstname" required></div>
                    <div><label for="lastname">Last Name</label><input type="text" id="lastname" name="lastname" required></div>
                    <div class="full-width"><label for="email">Email</label><input type="email" id="email" name="email" required></div>
                    <div class="full-width"><label for="message">Message</label><textarea id="message" name="message" required></textarea></div>
                    <div class="full-width"><button class="btn btn-primary" type="submit">Send Message</button></div>
                </div>
            </form>
        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <span>Connect: <a href="mailto:Frederick.Berberich1@marist.edu">Frederick.Berberich1@marist.edu</a> | <a href="https://github.com/Fberberich" target="_blank" rel="noopener noreferrer">GitHub</a> | <a href="https://www.linkedin.com/in/frederick-berberich/" target="_blank" rel="noopener noreferrer">LinkedIn</a></span>
            <span>&copy; 2026 Fred Berberich</span>
        </div>
    </footer>
</div>
<script src="assets/js/site.js"></script>
<script>
emailjs.init("lYymCRc4b32kGvvLy");
document.getElementById("contactForm").addEventListener("submit", function (event) {
    event.preventDefault();
    emailjs.sendForm("service_kw4bc8b", "template_dwzaqpr", this).then(
        function () {
            window.location.href = "/success.html";
        },
        function () {
            alert("Sorry, something went wrong. Please try again.");
        }
    );
});
</script>
</body>
</html>
